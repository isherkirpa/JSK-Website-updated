[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Proxy /api/* requests to your backend server on bothosting.net
# IMPORTANT: Replace "https://YOUR-BACKEND-URL.bothosting.net" with your actual backend URL
[[redirects]]
  from = "/api/*"
  to = "https://YOUR-BACKEND-URL.bothosting.net/api/:splat"
  status = 200
  force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
